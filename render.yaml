services:
  - type: web
    name: kimeal
    runtime: ruby
    plan: free
    buildCommand: bash ./bin/render-build.sh
    startCommand: ./bin/rails server
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kimeal-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: 2
      - key: RAILS_MAX_THREADS
        value: 3

databases:
  - name: kimeal-db
    databaseName: kimeal
    user: kimeal
    plan: free

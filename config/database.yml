default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: db
  username: postgres
  password: password

development:
  <<: *default
  database: kimeal_development

test:
  <<: *default
  database: kimeal_test

production:
  primary: &primary_production
    <<: *default
    database: kimeal_production
    username: kimeal
    password: <%= ENV["KIMEAL_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: kimeal_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: kimeal_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: kimeal_production_cable
    migrations_paths: db/cable_migrate
